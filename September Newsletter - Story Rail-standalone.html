  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1,51,51)  — body heading dark */\n  --color-gray-700: #666666;          /* rgb(102,102,102) — body text */\n  --color-gray-500: #828282;          /* rgb(130,130,130) — captions / hints */\n  --color-gray-300: #e0e0e0;          /* rgb(224,224,224) — borders */\n  --color-gray-200: #f2f2f2;          /* rgb(242,242,242) — fills */\n  --color-navy-text: #1e314c;         /* rgb(30,49,76)  — dark navy text on light */\n  --color-navy-deep: #092c4c;         /* rgb(9,44,76) */\n\n  /* — Secondary palette — (graphic & UI accents, charts, badges) */\n  --color-red: #b22113;               /* rgb(178,33,19) */\n  --color-orange: #eb7114;            /* rgb(235,113,20) */\n  --color-yellow: #e2af1d;            /* rgb(226,175,29) */\n  --color-green: #4da881;             /* rgb(77,168,129) */\n  --color-green-100: #ddf0e8;         /* rgb(221,240,232) */\n  --color-mint: #b5ddcc;              /* rgb(181,221,204) */\n  --color-taupe: #b1a497;             /* rgb(177,164,151) */\n\n  /* ===== Semantic aliases ===== */\n  --bg-page: var(--color-white);\n  --bg-surface: var(--color-surface-tint);\n  --bg-inverse: var(--color-brand-blue);\n\n  --text-heading: var(--color-black);\n  --text-body: var(--color-gray-700);\n  --text-muted: var(--color-gray-500);\n  --text-on-brand: var(--color-white);\n  --text-link: var(--color-link-blue);\n  --text-display: var(--color-electric-blue);\n\n  --border-default: var(--color-gray-300);\n  --border-strong: var(--color-blue-200);\n\n  --accent-primary: var(--color-brand-blue);\n  --accent-electric: var(--color-electric-blue);\n\n  --status-error: var(--color-red);\n  --status-warning: var(--color-orange);\n  --status-success: var(--color-green);\n  --status-info: var(--color-bright-blue);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Octopart — Typography tokens\n   Headings & body: Inter (Google Fonts), heading line-height 1.1×,\n   body line-height 1.4×. Marketing display: Gotham Pro\n   (substituted with Montserrat — see fonts.css).\n   ============================================================ */\n:root {\n  /* Families */\n  --font-sans: \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n  --font-display: \"Montserrat\", \"Gotham Pro\", \"Inter\", sans-serif; /* Gotham Pro substitute */\n\n  /* Weights */\n  --fw-light: 300;    /* @kind font */\n  --fw-regular: 400;  /* @kind font */\n  --fw-medium: 500;   /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700;     /* @kind font */\n  --fw-black: 900;    /* @kind font */\n\n  /* Heading scale — Title 1..5 (line-height 1.1×) */\n  --title-1-size: 56px;   --title-1-lh: 61.6px;\n  --title-2-size: 48px;   --title-2-lh: 52.8px;\n  --title-3-size: 40px;   --title-3-lh: 44px;\n  --title-4-size: 32px;   --title-4-lh: 35.2px;\n  --title-5-size: 24px;   --title-5-lh: 26.4px;\n\n  /* Section heading used throughout the guide */\n  --heading-section-size: 36px;\n  --heading-section-weight: var(--fw-semibold);\n\n  /* Body scale (line-height 1.4×) */\n  --text-xl-size: 20px;   --text-xl-lh: 28px;\n  --text-lg-size: 18px;   --text-lg-lh: 25.2px;\n  --text-md-size: 16px;   --text-md-lh: 22.4px;\n  --text-sm-size: 14px;   --text-sm-lh: 19.6px;\n  --text-xs-size: 12px;   --text-xs-lh: 16.8px;\n\n  /* Tracking — brand heads use a tight -4% */\n  --tracking-tight: -0.04em;\n  --tracking-normal: 0;\n\n  /* Line-height multipliers (per the guide) */\n  --lh-heading: 1.1; /* @kind other */\n  --lh-body: 1.4;    /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Octopart — Spacing, radius, shadow, layout tokens\n   ============================================================ */\n:root {\n  /* Spacing — derived from the guide's 10 / 20 / 50 / 70 rhythm */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 10px;   /* base gutter / button gap */\n  --space-4: 16px;\n  --space-5: 20px;   /* button h-padding */\n  --space-6: 24px;\n  --space-7: 32px;\n  --space-8: 50px;   /* card padding (vertical) */\n  --space-9: 70px;   /* card padding (horizontal) */\n\n  /* Radius */\n  --radius-sm: 2px;\n  --radius-md: 4px;   /* buttons */\n  --radius-lg: 8px;\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n  --radius-photo: 120px;  /* signature top-left photo corner */\n\n  /* Shadows */\n  --shadow-card: 0px 10px 11px 0px rgba(0, 0, 0, 0.04);\n  --shadow-elevated: 0px 12px 28px 0px rgba(15, 20, 45, 0.12);\n  --shadow-soft: 0px 4px 10px 0px rgba(15, 20, 45, 0.08);\n\n  /* Borders */\n  --border-width: 1px;\n  --border-width-strong: 1.5px;\n\n  /* Motion */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n\n  /* Icon sizing — guide specifies 40px icon frames, 20–24px glyphs */\n  --icon-frame: 40px;\n  --icon-glyph: 20px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Octopart — Base / typographic utilities\n   Reusable text-style classes mirroring the style-guide specimens.\n   ============================================================ */\n\nbody {\n  font-family: var(--font-sans);\n  color: var(--text-body);\n  background: var(--bg-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* — Headings (Inter, tight tracking, 1.1× line-height) — */\n.op-title-1 { font-family: var(--font-sans); font-weight: var(--fw-bold); font-size: var(--title-1-size); line-height: var(--title-1-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-title-2 { font-family: var(--font-sans); font-weight: var(--fw-bold); font-size: var(--title-2-size); line-height: var(--title-2-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-title-3 { font-family: var(--font-sans); font-weight: var(--fw-semibold); font-size: var(--title-3-size); line-height: var(--title-3-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-title-4 { font-family: var(--font-sans); font-weight: var(--fw-semibold); font-size: var(--title-4-size); line-height: var(--title-4-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-title-5 { font-family: var(--font-sans); font-weight: var(--fw-medium); font-size: var(--title-5-size); line-height: var(--title-5-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-section-heading { font-family: var(--font-sans); font-weight: var(--heading-section-weight); font-size: var(--heading-section-size); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n\n/* — Body (Inter, 1.4× line-height) — */\n.op-text-xl { font-size: var(--text-xl-size); line-height: var(--text-xl-lh); }\n.op-text-lg { font-size: var(--text-lg-size); line-height: var(--text-lg-lh); }\n.op-text-md { font-size: var(--text-md-size); line-height: var(--text-md-lh); }\n.op-text-sm { font-size: var(--text-sm-size); line-height: var(--text-sm-lh); }\n.op-text-xs { font-size: var(--text-xs-size); line-height: var(--text-xs-lh); }\n\n/* — Marketing display (Gotham Pro → Montserrat substitute) — */\n.op-display { font-family: var(--font-display); font-weight: var(--fw-black); color: var(--text-display); line-height: 1; letter-spacing: -0.01em; }\n\n/* — Inline link — */\n.op-link { color: var(--text-link); text-decoration: none; }\n.op-link:hover { text-decoration: underline; }\n<\u002Fstyle>\n  <style>/* Generated by fig_materialize — background/mask classes for extracted bitmaps.\n * One rule per line; url()s are relative to this file, so it must stay\n * next to the assets/ directory it references. */\n.fig-asset-a9e44a5e69ec6928 { background: url(./assets/a9e44a5e69ec6928.jpg) center / cover no-repeat; }\n.fig-asset-d31025035ea3b7c9 { background: url(./assets/d31025035ea3b7c9.png) center / cover no-repeat; }\n.fig-asset-1654dc72ba2eac5b { d verbatim from the \"⚙️ Octopart Templates\" style guide.\n   ============================================================ */\n:root {\n  /* — Primary brand — (headings, logo, icons) */\n  --color-brand-blue: #285483;        /* rgb(40,84,131)  — primary Octopart blue */\n  --color-black: #000000;\n  --color-white: #ffffff;\n  --color-off-white: #f0f0f0;\n\n  /* — Electric / accent blues — (marketing display, links, highlights) */\n  --color-electric-blue: #2a69ef;     /* rgb(42,105,239) — big marketing titles */\n  --color-bright-blue: #319cff;       /* rgb(49,156,255) — accent / CTA glow */\n  --color-link-blue: #0d52a1;         /* rgb(13,82,161)  — inline links */\n\n  /* — Blue ramp — (subtexts, UI elements) */\n  --color-blue-700: #285483;\n  --color-blue-600: #3671b0;          /* rgb(54,113,176) */\n  --color-blue-500: #568fca;          /* rgb(86,143,202) */\n  --color-blue-200: #cedef0;          /* rgb(206,222,240) */\n  --color-blue-100: #e3e9f0;          /* rgb(227,233,240) */\n  --color-surface-tint: #f6fafd;      /* rgb(246,250,253) — light blue page tint */\n\n  /* — Neutral ramp — (subtexts, UI elements) */\n  --color-gray-900: #333333;          /* rgb(51,51,51)  — body heading dark */\n  --color-gray-700: #666666;          /* rgb(102,102,102) — body text */\n  --color-gray-500: #828282;          /* rgb(130,130,130) — captions / hints */\n  --color-gray-300: #e0e0e0;          /* rgb(224,224,224) — borders */\n  --color-gray-200: #f2f2f2;          /* rgb(242,242,242) — fills */\n  --color-navy-text: #1e314c;         /* rgb(30,49,76)  — dark navy text on light */\n  --color-navy-deep: #092c4c;         /* rgb(9,44,76) */\n\n  /* — Secondary palette — (graphic & UI accents, charts, badges) */\n  --color-red: #b22113;               /* rgb(178,33,19) */\n  --color-orange: #eb7114;            /* rgb(235,113,20) */\n  --color-yellow: #e2af1d;            /* rgb(226,175,29) */\n  --color-green: #4da881;             /* rgb(77,168,129) */\n  --color-green-100: #ddf0e8;         /* rgb(221,240,232) */\n  --color-mint: #b5ddcc;              /* rgb(181,221,204) */\n  --color-taupe: #b1a497;             /* rgb(177,164,151) */\n\n  /* ===== Semantic aliases ===== */\n  --bg-page: var(--color-white);\n  --bg-surface: var(--color-surface-tint);\n  --bg-inverse: var(--color-brand-blue);\n\n  --text-heading: var(--color-black);\n  --text-body: var(--color-gray-700);\n  --text-muted: var(--color-gray-500);\n  --text-on-brand: var(--color-white);\n  --text-link: var(--color-link-blue);\n  --text-display: var(--color-electric-blue);\n\n  --border-default: var(--color-gray-300);\n  --border-strong: var(--color-blue-200);\n\n  --accent-primary: var(--color-brand-blue);\n  --accent-electric: var(--color-electric-blue);\n\n  --status-error: var(--color-red);\n  --status-warning: var(--color-orange);\n  --status-success: var(--color-green);\n  --status-info: var(--color-bright-blue);\n}\n\n/* ============================================================\n   Octopart — Typography tokens\n   Headings & body: Inter (Google Fonts), heading line-height 1.1×,\n   body line-height 1.4×. Marketing display: Gotham Pro\n   (substituted with Montserrat — see fonts.css).\n   ============================================================ */\n:root {\n  /* Families */\n  --font-sans: \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n  --font-display: \"Montserrat\", \"Gotham Pro\", \"Inter\", sans-serif; /* Gotham Pro substitute */\n\n  /* Weights */\n  --fw-light: 300;    /* @kind font */\n  --fw-regular: 400;  /* @kind font */\n  --fw-medium: 500;   /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700;     /* @kind font */\n  --fw-black: 900;    /* @kind font */\n\n  /* Heading scale — Title 1..5 (line-height 1.1×) */\n  --title-1-size: 56px;   --title-1-lh: 61.6px;\n  --title-2-size: 48px;   --title-2-lh: 52.8px;\n  --title-3-size: 40px;   --title-3-lh: 44px;\n  --title-4-size: 32px;   --title-4-lh: 35.2px;\n  --title-5-size: 24px;   --title-5-lh: 26.4px;\n\n  /* Section heading used throughout the guide */\n  --heading-section-size: 36px;\n  --heading-section-weight: var(--fw-semibold);\n\n  /* Body scale (line-height 1.4×) */\n  --text-xl-size: 20px;   --text-xl-lh: 28px;\n  --text-lg-size: 18px;   --text-lg-lh: 25.2px;\n  --text-md-size: 16px;   --text-md-lh: 22.4px;\n  --text-sm-size: 14px;   --text-sm-lh: 19.6px;\n  --text-xs-size: 12px;   --text-xs-lh: 16.8px;\n\n  /* Tracking — brand heads use a tight -4% */\n  --tracking-tight: -0.04em;\n  --tracking-normal: 0;\n\n  /* Line-height multipliers (per the guide) */\n  --lh-heading: 1.1; /* @kind other */\n  --lh-body: 1.4;    /* @kind other */\n}\n\n/* ============================================================\n   Octopart — Spacing, radius, shadow, layout tokens\n   ============================================================ */\n:root {\n  /* Spacing — derived from the guide's 10 / 20 / 50 / 70 rhythm */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 10px;   /* base gutter / button gap */\n  --space-4: 16px;\n  --space-5: 20px;   /* button h-padding */\n  --space-6: 24px;\n  --space-7: 32px;\n  --space-8: 50px;   /* card padding (vertical) */\n  --space-9: 70px;   /* card padding (horizontal) */\n\n  /* Radius */\n  --radius-sm: 2px;\n  --radius-md: 4px;   /* buttons */\n  --radius-lg: 8px;\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n  --radius-photo: 120px;  /* signature top-left photo corner */\n\n  /* Shadows */\n  --shadow-card: 0px 10px 11px 0px rgba(0, 0, 0, 0.04);\n  --shadow-elevated: 0px 12px 28px 0px rgba(15, 20, 45, 0.12);\n  --shadow-soft: 0px 4px 10px 0px rgba(15, 20, 45, 0.08);\n\n  /* Borders */\n  --border-width: 1px;\n  --border-width-strong: 1.5px;\n\n  /* Motion */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n\n  /* Icon sizing — guide specifies 40px icon frames, 20–24px glyphs */\n  --icon-frame: 40px;\n  --icon-glyph: 20px;\n}\n\n/* ============================================================\n   Octopart — Base / typographic utilities\n   Reusable text-style classes mirroring the style-guide specimens.\n   ============================================================ */\n\nbody {\n  font-family: var(--font-sans);\n  color: var(--text-body);\n  background: var(--bg-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* — Headings (Inter, tight tracking, 1.1× line-height) — */\n.op-title-1 { font-family: var(--font-sans); font-weight: var(--fw-bold); font-size: var(--title-1-size); line-height: var(--title-1-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-title-2 { font-family: var(--font-sans); font-weight: var(--fw-bold); font-size: var(--title-2-size); line-height: var(--title-2-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-title-3 { font-family: var(--font-sans); font-weight: var(--fw-semibold); font-size: var(--title-3-size); line-height: var(--title-3-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-title-4 { font-family: var(--font-sans); font-weight: var(--fw-semibold); font-size: var(--title-4-size); line-height: var(--title-4-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-title-5 { font-family: var(--font-sans); font-weight: var(--fw-medium); font-size: var(--title-5-size); line-height: var(--title-5-lh); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n.op-section-heading { font-family: var(--font-sans); font-weight: var(--heading-section-weight); font-size: var(--heading-section-size); letter-spacing: var(--tracking-tight); color: var(--text-heading); }\n\n/* — Body (Inter, 1.4× line-height) — */\n.op-text-xl { font-size: var(--text-xl-size); line-height: var(--text-xl-lh); }\n.op-text-lg { font-size: var(--text-lg-size); line-height: var(--text-lg-lh); }\n.op-text-md { font-size: var(--text-md-size); line-height: var(--text-md-lh); }\n.op-text-sm { font-size: var(--text-sm-size); line-height: var(--text-sm-lh); }\n.op-text-xs { font-size: var(--text-xs-size); line-height: var(--text-xs-lh); }\n\n/* — Marketing display (Gotham Pro → Montserrat substitute) — */\n.op-display { font-family: var(--font-display); font-weight: var(--fw-black); color: var(--text-display); line-height: 1; letter-spacing: -0.01em; }\n\n/* — Inline link — */\n.op-link { color: var(--text-link); text-decoration: none; }\n.op-link:hover { text-decoration: underline; }\n\n/* Generated by fig_materialize — background/mask classes for extracted bitmaps.\n * One rule per line; url()s are relative to this file, so it must stay\n * next to the assets/ directory it references. */\n.fig-asset-a9e44a5e69ec6928 { background: url(./assets/a9e44a5e69ec6928.jpg) center / cover no-repeat; }\n.fig-asset-d31025035ea3b7c9 { background: url(./assets/d31025035ea3b7c9.png) center / cover no-repeat; }\n.fig-asset-1654dc72ba2eac5b { background: url(./assets/1654dc72ba2eac5b.png) center / cover no-repeat; }\n.fig-asset-2ece09866e7c907b-be21d2df { background: url(./assets/2ece09866e7c907b.png) center / contain no-repeat; }\n.fig-asset-be3f25ec6cc1fb2f { background: url(./assets/be3f25ec6cc1fb2f.png) center / cover no-repeat; }\n.fig-asset-e23dc9358bf633c6 { background: url(./assets/e23dc9358bf633c6.png) center / cover no-repeat; }\n.fig-asset-24123e69badcdfb9 { background: url(./assets/24123e69badcdfb9.png) center / cover no-repeat; }\n.fig-asset-24123e69badcdfb9-c94faa4c { background: url(./assets/24123e69badcdfb9.png) 0.024% 50% / 701.994% 100% no-repeat; }\n.fig-asset-4bcc694c710fbfd8 { background: url(./assets/4bcc694c710fbfd8.png) center / cover no-repeat; }\n.fig-asset-6334a454616885b7-2580f726 { background: url(./assets/6334a454616885b7.png) 50% 38.443% / 100% 296.296% no-repeat; }\n.fig-asset-c1aba62590568d2b { background: url(./assets/c1aba62590568d2b.png) center / cover no-repeat; }\n.fig-asset-c6a7f13d5a55524d { background: url(./assets/c6a7f13d5a55524d.png) center / cover no-repeat; }\n.fig-asset-ece0eea1f28f2100 { background: url(./assets/ece0eea1f28f2100.jpg) center / cover no-repeat; }\n\n<\u002Fstyle>\n  <script src=\"ac881612-c846-42ba-b056-87a358c60a73\"><\u002Fscript>\n  <style>\n    body{margin:0;background:var(--color-surface-tint, #F6FAFD);font-family:var(--font-sans, system-ui, sans-serif)}\n    a{color:var(--color-link-blue);text-decoration:none}\n    a:hover{color:var(--color-electric-blue);text-decoration:underline}\n    .nl-tab{border:none;cursor:pointer;font-family:var(--font-sans);border-radius:999px;padding:9px 18px;font-size:13px;font-weight:600;transition:all .15s ease}\n    .nl-cta-link{border:none;background:transparent;cursor:pointer;font-family:var(--font-sans);font-weight:700;font-size:14px;color:var(--color-link-blue);padding:0;text-align:left}\n    .nl-pill{display:inline-block;padding:3px 10px;border-radius:999px;font:600 11px/1.6 var(--font-sans);letter-spacing:.02em}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"padding:48px 24px;display:flex;justify-content:center\">\n<div style=\"width:100%;max-width:1040px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 12px 40px rgba(9,44,76,.16);font-family:var(--font-sans)\">\n\n  <div style=\"padding:22px 44px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--color-blue-100)\">\n    <img src=\"40d99c65-a0a1-4eeb-92bb-3f5da9c65424\" alt=\"Octopart\" style=\"height:26px;width:auto;display:block\">\n    <div style=\"display:flex;gap:6px\">\n      <button class=\"nl-tab\" onclick=\"{{ goAll }}\" style=\"{{ tabAll }}\">All Readers<\u002Fbutton>\n      <button class=\"nl-tab\" onclick=\"{{ goSe }}\" style=\"{{ tabSe }}\">System Engineers<\u002Fbutton>\n      <button class=\"nl-tab\" onclick=\"{{ goEe }}\" style=\"{{ tabEe }}\">Electrical Engineers<\u002Fbutton>\n      <button class=\"nl-tab\" onclick=\"{{ goProc }}\" style=\"{{ tabProc }}\">Procurement<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:relative\">\n    <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"hero-story\" shape=\"rect\" style=\"width:100%;height:400px\" placeholder=\"Drop a Block Diagram View product shot\" hint-size=\"1040px,400px\"><\u002Fx-import>\n    <div style=\"position:absolute;left:0;right:0;bottom:0;padding:44px;background:linear-gradient(0deg,rgba(9,44,76,.92) 10%,rgba(9,44,76,0) 100%)\">\n      <span class=\"nl-pill\" style=\"background:var(--color-electric-blue);color:#fff;font-size:12px\">Discover · New This Month<\u002Fspan>\n      <div style=\"font:800 44px/1.1 var(--font-display);color:#fff;letter-spacing:-.02em;margin-top:14px;max-width:680px\">Start Your Design at the Block Diagram<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:36px 44px 8px;display:flex;gap:40px;align-items:flex-start\">\n    <p style=\"font:400 16px/1.7 var(--font-sans);color:var(--color-gray-700);flex:1;margin:0\">New this month: Block Diagram View. Define your system's functional blocks, interfaces, and constraints before a single part number exists — then let Electronic System Designer turn that diagram into a model our tools understand. This issue is about the two things that decide a board's fate: the brains and the power around them.<\u002Fp>\n    <div style=\"flex-shrink:0;padding-top:4px\">\n      <x-import component-from-global-scope=\"OctopartDesignSystem_4fc882.Button\" variant=\"secondary\" size=\"large\" hint-size=\"auto,47px\">Try Block Diagram View →<\u002Fx-import>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin:32px 44px;padding:26px 28px;border-radius:14px;background:var(--color-surface-tint);border:1.5px solid var(--color-blue-200);display:flex;gap:22px;align-items:center\">\n    <x-import component-from-g ex-start\">\n            <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"thumb-{{ item.id }}\" style=\"width:160px;height:120px;flex-shrink:0\" shape=\"rounded\" radius=\"10\" placeholder=\"{{ item.img }}\"><\u002Fx-import>\n            <div style=\"flex:1;min-width:0\">\n              <sc-if value=\"{{ item.tag }}\" hint-placeholder-val=\"{{ true }}\"><span class=\"nl-pill\" style=\"background:var(--color-blue-100);color:var(--color-brand-blue)\">{{ item.tag }}<\u002Fspan><\u002Fsc-if>\n              <div style=\"font:800 22px/1.3 var(--font-display);color:var(--color-navy-text);margin-top:10px\">{{ item.headline }}<\u002Fdiv>\n              <p style=\"font:400 15px/1.6 var(--font-sans);color:var(--color-gray-700);margin:10px 0 0;max-width:760px\">{{ item.intro }}<\u002Fp>\n              <button class=\"nl-cta-link\" style=\"margin-top:12px\">{{ item.cta }} →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showMarket }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"order:{{ orderMarket }}\">\n      <div style=\"background:var(--color-orange);padding:16px 44px;display:flex;align-items:baseline;gap:14px\">\n        <span style=\"font:800 30px/1 var(--font-display);color:rgba(255,255,255,.55)\">02<\u002Fspan>\n        <span style=\"font:700 15px/1 var(--font-sans);letter-spacing:.14em;color:#fff;text-transform:uppercase\">Market Data<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:8px 44px 20px\">\n        <sc-for list=\"{{ market }}\" as=\"item\" hint-placeholder-count=\"1\">\n          <div style=\"padding:22px 0;border-bottom:1px solid var(--color-blue-100);display:flex;gap:24px;align-items:flex-start\">\n            <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"thumb-{{ item.id }}\" style=\"width:160px;height:120px;flex-shrink:0\" shape=\"rounded\" radius=\"10\" placeholder=\"{{ item.img }}\"><\u002Fx-import>\n            <div style=\"flex:1;min-width:0\">\n              <sc-if value=\"{{ item.tag }}\" hint-placeholder-val=\"{{ true }}\"><span class=\"nl-pill\" style=\"background:#fbeccf;color:#8a5a06\">{{ item.tag }}<\u002Fspan><\u002Fsc-if>\n              <div style=\"font:800 22px/1.3 var(--font-display);color:var(--color-navy-text);margin-top:10px\">{{ item.headline }}<\u002Fdiv>\n              <p style=\"font:400 15px/1.6 var(--font-sans);color:var(--color-gray-700);margin:10px 0 0;max-width:760px\">{{ item.intro }}<\u002Fp>\n              <button class=\"nl-cta-link\" style=\"margin-top:12px\">{{ item.cta }} →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showEducate }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"order:{{ orderEducate }}\">\n      <div style=\"background:var(--color-green);padding:16px 44px;display:flex;align-items:baseline;gap:14px\">\n        <span style=\"font:800 30px/1 var(--font-display);color:rgba(255,255,255,.55)\">03<\u002Fspan>\n        <span style=\"font:700 15px/1 var(--font-sans);letter-spacing:.14em;color:#fff;text-transform:uppercase\">Educate<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:8px 44px 20px\">\n        <sc-for list=\"{{ educate }}\" as=\"item\" hint-placeholder-count=\"1\">\n          <div style=\"padding:22px 0;border-bottom:1px solid var(--color-blue-100);display:flex;gap:24px;align-items:flex-start\">\n            <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"thumb-{{ item.id }}\" style=\"width:160px;height:120px;flex-shrink:0\" shape=\"rounded\" radius=\"10\" placeholder=\"{{ item.img }}\"><\u002Fx-import>\n            <div style=\"flex:1;min-width:0\">\n              <sc-if value=\"{{ item.tag }}\" hint-placeholder-val=\"{{ true }}\"><span class=\"nl-pill\" style=\"background:var(--color-green-100);color:#1f6e4f\">{{ item.tag }}<\u002Fspan><\u002Fsc-if>\n              <div style=\"font:800 22px/1.3 var(--font-display);color:var(--color-navy-text);margin-top:10px\">{{ item.headline }}<\u002Fdiv>\n              <p style=\"font:400 15px/1.6 var(--font-sans);color:var(--color-gray-700);margin:10px 0 0;max-width:760px\">{{ item.intro }}<\u002Fp>\n              <button class=\"nl-cta-link\" style=\"margin-top:12px\">{{ item.cta }} →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showCommunity }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"order:{{ orderCommunity }}\">\n      <div style=\"background:var(--color-brand-blue);padding:16px 44px;display:flex;align-items:baseline;gap:14px\">\n        <span style=\"font:800 30px/1 var(--font-display);color:rgba(255,255,255,.5)\">04<\u002Fspan>\n        <span style=\"font:700 15px/1 var(--font-sans);letter-spacing:.14em;color:#fff;text-transform:uppercase\">Community<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"padding:8px 44px 40px\">\n        <sc-for list=\"{{ community }}\" as=\"item\" hint-placeholder-count=\"1\">\n          <div style=\"padding:22px 0;border-bottom:1px solid var(--color-blue-100);display:flex;gap:24px;align-items:flex-start\">\n            <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"thumb-{{ item.id }}\" style=\"width:160px;height:120px;flex-shrink:0\" shape=\"rounded\" radius=\"10\" placeholder=\"{{ item.img }}\"><\u002Fx-import>\n            <div style=\"flex:1;min-width:0\">\n              <sc-if value=\"{{ item.tag }}\" hint-placeholder-val=\"{{ true }}\"><span class=\"nl-pill\" style=\"background:var(--color-blue-100);color:var(--color-brand-blue)\">{{ item.tag }}<\u002Fspan><\u002Fsc-if>\n              <div style=\"font:800 22px/1.3 var(--font-display);color:var(--color-navy-text);margin-top:10px\">{{ item.headline }}<\u002Fdiv>\n              <p style=\"font:400 15px/1.6 var(--font-sans);color:var(--color-gray-700);margin:10px 0 0;max-width:760px\">{{ item.intro }}<\u002Fp>\n              <button class=\"nl-cta-link\" style=\"margin-top:12px\">{{ item.cta }} →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <div style=\"margin:8px 44px 0;padding:26px 28px;border-radius:14px;background:var(--color-surface-tint);border:1.5px solid var(--color-blue-200);display:flex;gap:22px;align-items:center\">\n    <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"adLogo2-story\" style=\"width:110px;height:72px;flex-shrink:0\" shape=\"rounded\" radius=\"8\" placeholder=\"Texas Instruments logo\"><\u002Fx-import>\n    <div style=\"flex:1\">\n      <span class=\"nl-pill\" style=\"background:var(--color-brand-blue);color:#fff;font-size:10px\">Sponsored<\u002Fspan>\n      <div style=\"font:700 18px/1.3 var(--font-sans);color:var(--color-navy-text);margin-top:8px\">Manufacturer Spotlight · Texas Instruments<\u002Fdiv>\n      <p style=\"font:400 14px/1.5 var(--font-sans);color:var(--color-gray-700);margin:6px 0 0\">The newest MCU and PMIC families from Texas Instruments, with datasheets and eval kits ready to explore.<\u002Fp>\n    <\u002Fdiv>\n    <x-import component-from-global-scope=\"OctopartDesignSystem_4fc882.Button\" variant=\"default\" size=\"small\" hint-size=\"auto,32px\">Explore the Lineup →<\u002Fx-import>\n  <\u002Fdiv>\n  <p style=\"margin:14px 44px 32px;font:400 11px/1.5 var(--font-sans);color:var(--color-gray-500)\">This space is reserved for Octopart distributor and manufacturer partners. <a href=\"#\">Advertise in The Pulse →<\u002Fa><\u002Fp>\n\n  <div style=\"padding:30px 44px;border-top:1px solid var(--color-blue-100)\">\n    <div style=\"font:700 11px/1 var(--font-sans);letter-spacing:.14em;color:var(--color-gray-500);text-transform:uppercase;text-align:center;margin-bottom:18px\">Featured Distributor &amp; Manufacturer Partners<\u002Fdiv>\n    <div style=\"display:flex;gap:20px;justify-content:center;flex-wrap:wrap\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"partnerLogo1-story\" style=\"width:130px;height:56px\" shape=\"rounded\" radius=\"8\" placeholder=\"Mouser logo\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"partnerLogo2-story\" style=\"width:130px;height:56px\" shape=\"rounded\" radius=\"8\" placeholder=\"Avnet logo\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"partnerLogo3-story\" style=\"width:130px;height:56px\" shape=\"rounded\" radius=\"8\" placeholder=\"Digi-Key logo\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"partnerLogo4-story\" style=\"width:130px;height:56px\" shape=\"rounded\" radius=\"8\" placeholder=\"Samsung logo\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"image-slot\" from=\"2bf029ec-1d98-4dae-bf39-9fcace424667#/image-slot.js\" id=\"partnerLogo5-story\" style=\"width:130px;height:56px\" shape=\"rounded\" radius=\"8\" placeholder=\"Texas Instruments logo\"><\u002Fx-import>\n    <\u002Fdiv>\n    <p style=\"text-align:center;margin:16px 0 0;font:400 12px/1.5 var(--font-sans)\"><a href=\"#\">Interested in advertising here? Contact our partnerships team →<\u002Fa><\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"background:var(--color-navy-text);padding:30px 44px;display:flex;flex-direction:column;gap:12px;align-items:center\">\n    <img src=\"5aace7bf-d639-40cb-aed6-105508790860\" alt=\"Octopart\" style=\"height:22px;width:auto;display:block;filter:brightness(0) invert(1)\">\n    <div style=\"display:flex;gap:10px\">\n      <x-import component-from-global-scope=\"OctopartDesignSystem_4fc882.SocialButton\" network=\"linkedin\" size=\"32\" hint-size=\"32px,32px\"><\u002Fx-import>\n      <x-import component-from-global-scope=\"OctopartDesignSystem_4fc882.SocialButton\" network=\"blog\" size=\"32\" hint-size=\"32px,32px\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"font:400 12px/1.6 var(--font-sans);color:rgba(255,255,255,.55);text-align:center\">You're receiving this because you subscribed to Octopart Discover.<br>Forward to a colleague who'd find it useful.<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { audience: 'all' };\n\n  TOPICS = [\n    { id: 'g1', audience: 'all', pillar: 'discover', tag: null, headline: 'Start Your Design at the Block Diagram', intro: \"New this month: Block Diagram View. Define your system's functional blocks, interfaces, and constraints before a single part number exists.\", cta: 'Try Block Diagram View', img: 'Block diagram / system architecture screenshot' },\n    { id: 'se1', audience: 'se', pillar: 'discover', tag: 'System Engineers', headline: 'Explore MCU and Power Options by Describing What the Block Needs', intro: 'Before you lock a controller or power tree, describe what the block has to do in plain terms. Descriptive Search maps that intent to viable candidates across suppliers — pair it with your block diagram, and the shortlist lines up with the system you actually described.', cta: 'Try Descriptive Search', img: 'Descriptive Search UI screenshot' },\n    { id: 'ee1', audience: 'ee', pillar: 'discover', tag: 'Electrical Engineers', headline: 'Describe the MCU You Need — Skip the Part Number', intro: \"You know the peripheral mix, the power budget, and the security level — what you don't have is the part number. Descriptive Search maps your requirements to viable MCU candidates across suppliers, so you start from a shortlist that fits.\", cta: 'Try It On Your Shortlist', img: 'Close-up photo of an MCU chip on a PCB' },\n    { id: 'se2', audience: 'se', pillar: 'market', tag: 'System Engineers', headline: 'Why a Modern EV Carries 300+ Controllers — and What It Signals for You', intro: 'A battery-electric vehicle now runs on 300+ controllers vs. roughly 70 in a combustion car — the zonal architecture shift in action. More distributed intelligence means more sourcing exposure per board: every added controller is one more part to qualify and second-source.', cta: 'Read the Full Briefing', img: 'Photo of an EV powertrain / battery pack' },\n    { id: 'ee2', audience: 'ee', pillar: 'market', tag: 'Electrical Engineers', headline: \"The Secure-MCU Shift Is Changing What's on the Shelf\", intro: \"Hardware security is moving from optional to baseline — NXP EdgeLock, Infineon AURIX TC4x with post-quantum crypto. That's reshaping which MCUs suppliers stock and keep in production, and what's quietly getting designed out.\", cta: \"See What's on Watch\", img: 'Photo of a secure MCU / hardware security module' },\n    { id: 'p1', audience: 'proc', pillar: 'market', tag: 'Procurement', headline: 'Four Suppliers, ~70% of the MCU Market — Your Concentration Risk', intro: 'Infineon, NXP, Renesas, and STMicroelectronics hold close to 70% of the MCU market. Layer on tariff shifts and fab concentration, and one event can ripple across your BOM — here is how to think about second-sourcing.', cta: 'Get Supplier-Risk Intel', img: 'Semiconductor fab / wafer photo' },\n    { id: 'se3', audience: 'se', pillar: 'educate', tag: 'System Engineers', headline: 'MCU, MPU, or Accelerator? Picking Edge-AI Compute Before You Commit', intro: 'On-device AI forces a fork at the architecture stage: stretch a capable MCU, step up to an MPU, or add a dedicated accelerator. Each choice locks in cost, power, and thermal for the product\\'s life.', cta: 'Get the Framework', img: 'Photo of an edge-AI dev board' },\n    { id: 'ee3', audience: 'ee', pillar: 'educate', tag: 'Electrical Engineers', headline: 'Discrete Regulators or a PMIC? Making the Power-Tree Call', intro: 'A PMIC collapses a dozen rails into one part and reclaims board space — until it locks you into a fixed configuration or a single supplier. Discrete regulators hand back flexibility at the cost of area.', cta: 'Read the Power-Tree Guide', img: 'Photo of a PMIC / power regulator board' },\n    { id: 'p2', audience: 'proc', pillar: 'educate', tag: 'Procurement', headline: 'Decoding Lifecycle Status Before It Costs You a Line-Down', intro: \"Active, not-recommended-for-new-design, last-time-buy, obsolete — an MCU or PMIC's lifecycle status tells you exactly how much runway a design has, if you read it in time.\", cta: 'Set Up Alerts', img: 'Screenshot of a datasheet lifecycle status page' },\n    { id: 'g2', audience: 'all', pillar: 'community', tag: null, headline: 'Embedded World Lands in Anaheim — Your Field Guide', intro: \"Embedded World North America is nearly here: Sep 22–24 at the Anaheim Convention Center — three days on microcontrollers, processors, sensors, and connectivity. Forward this to an engineer who'd appreciate it.\", cta: 'See the Field Guide', img: 'Embedded World Anaheim show floor / exterior photo' },\n    { id: 'p3', audience: 'proc', pillar: 'community', tag: 'Procurement · Poll', headline: \"How Many Second Sources Before You'll Approve a Part?\", intro: \"Sole-source parts are quick to spec and painful to live with. So we're asking: one source, one backup required, or two-plus mandatory before approval? Vote below.\", cta: 'Cast Your Vote', img: 'Photo of a procurement team reviewing a BOM' }\n  ];\n\n  filterPillar(pillar, audience) {\n    return this.TOPICS.filter(t => t.pillar === pillar && (audience === 'all' || t.audience === 'all' || t.audience === audience));\n  }\n\n  computeLayout(audience) {\n    const pillars = ['discover', 'market', 'educate', 'community'];\n    const counts = {};\n    pillars.forEach(p => {\n      const list = this.filterPillar(p, audience).filter(t => !(p === 'discover' && t.id === 'g1'));\n      counts[p] = list.length;\n    });\n    const nonEmpty = pillars.filter(p => counts[p] > 0);\n    const empty = pillars.filter(p => counts[p] === 0);\n    const sorted = [...nonEmpty, ...empty];\n    const order = {};\n    sorted.forEach((p, i) => { order[p] = i; });\n    return {\n      orderDiscover: order.discover,\n      orderMarket: order.market,\n      orderEducate: order.educate,\n      orderCommunity: order.community,\n      showDiscover: counts.discover > 0,\n      showMarket: counts.market > 0,\n      showEducate: counts.educate > 0,\n      showCommunity: counts.community > 0\n    };\n  }\n\n  tabStyleFor(current, value) {\n    const active = current === value;\n    return {\n      background: active ? 'var(--color-electric-blue)' : '#ffffff',\n      color: active ? '#ffffff' : 'var(--color-brand-blue)',\n      border: active ? '1px solid var(--color-electric-blue)' : '1px solid var(--color-blue-200)'\n    };\n  }\n\n  renderVals() {\n    const audience = this.state.audience;\n    const layout = this.computeLayout(audience);\n    return {\n      audience,\n      discover: this.filterPillar('discover', audience).filter(t => t.id !== 'g1'),\n      market: this.filterPillar('market', audience),\n      educate: this.filterPillar('educate', audience),\n      community: this.filterPillar('community', audience),\n      ...layout,\n      tabAll: this.tabStyleFor(audience, 'all'),\n      tabSe: this.tabStyleFor(audience, 'se'),\n      tabEe: this.tabStyleFor(audience, 'ee'),\n      tabProc: this.tabStyleFor(audience, 'proc'),\n      goAll: () => this.setState({ audience: 'all' }),\n      goSe: () => this.setState({ audience: 'se' }),\n      goEe: () => this.setState({ audience: 'ee' }),\n      goProc: () => this.setState({ audience: 'proc' })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
